<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Bütçe Pro</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root {
  --bg:#f8fafc;--surface:#fff;--border:#e2e8f0;--text:#0f172a;--muted:#64748b;
  --teal:#0d9488;--clr-kredi:#0369a1;--clr-market:#ea580c;--clr-diger:#8b5cf6;--clr-yatirim:#15803d;
  --nav-h:64px;--safe-bot:env(safe-area-inset-bottom,0px);--safe-top:env(safe-area-inset-top,0px);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);font-size:13px;line-height:1.5;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased;}

/* ── ORTAK ── */
.modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:500;display:flex;align-items:center;justify-content:center;padding:16px;}
.modal-box{background:#fff;border-radius:16px;width:100%;max-width:460px;overflow:hidden;box-shadow:0 25px 50px rgba(0,0,0,.15);}
.modal-hdr{padding:16px 20px;background:#f8fafc;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.modal-title{font-weight:700;font-size:14px;}
.modal-close{cursor:pointer;color:var(--muted);font-size:20px;line-height:1;padding:2px 8px;border-radius:4px;}
.modal-close:hover{background:#f1f5f9;}
.modal-body{padding:16px 20px;}
.modal-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;margin-bottom:6px;letter-spacing:.5px;}
.modal-textarea{width:100%;border:1px solid var(--border);border-radius:10px;padding:10px 12px;font-family:'IBM Plex Sans',sans-serif;font-size:13px;resize:none;height:80px;outline:none;color:var(--text);}
.modal-textarea:focus{border-color:var(--teal);}
.modal-footer{padding:12px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;}
.modal-btn{padding:8px 18px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:'IBM Plex Sans',sans-serif;border:1px solid var(--border);background:var(--surface);color:var(--text);transition:.15s;}
.modal-btn:hover{background:#f1f5f9;}
.modal-btn.primary{background:var(--teal);color:#fff;border-color:var(--teal);}
.modal-btn.primary:hover{background:#0f766e;}
.toast{position:fixed;bottom:22px;right:22px;background:#1e293b;color:#fff;padding:10px 18px;border-radius:10px;font-size:12px;font-weight:600;opacity:0;transition:opacity .2s;pointer-events:none;z-index:9999;max-width:320px;}
.toast.show{opacity:1;}
.section-block{background:var(--surface);border-radius:12px;margin-bottom:12px;overflow:hidden;border:1px solid var(--border);}
.section-hdr{padding:11px 16px;color:#fff;font-weight:700;font-size:13px;display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none;}
.section-hdr .s-total{margin-left:auto;font-size:11px;opacity:.9;}
.section-hdr .chev{font-size:9px;opacity:.7;transition:transform .2s;flex-shrink:0;}
.section-hdr .chev.open{transform:rotate(90deg);}
.section-body{display:none;}
.section-body.open{display:block;}
.hdr-kredi{background:var(--clr-kredi);}.hdr-market{background:var(--clr-market);}
.hdr-diger{background:var(--clr-diger);}.hdr-yatirim{background:var(--clr-yatirim);}
.progress-wrap{height:6px;background:#e2e8f0;border-radius:10px;overflow:hidden;}
.progress-bar{height:100%;border-radius:10px;transition:width .5s ease,background .3s;}
#import-file{display:none;}

/* ══ MASAÜSTÜ (≥768px) ══ */
@media(min-width:768px){
  .mobile-only{display:none!important;}
  .mob-app,.mob-drawer,.mob-nav{display:none!important;}
  .shell{display:flex;min-height:100vh;}
  .desktop-sidebar{width:240px;background:#161d2f;color:#fff;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;flex-shrink:0;z-index:100;}
  .sb-logo{padding:22px 20px;font-weight:800;font-size:15px;color:#5eead4;border-bottom:1px solid #1e293b;display:flex;justify-content:space-between;align-items:center;cursor:pointer;}
  .sb-scroll{flex:1;overflow-y:auto;padding:8px 0;}
  .sb-scroll::-webkit-scrollbar{width:4px;}
  .sb-scroll::-webkit-scrollbar-thumb{background:#334155;border-radius:4px;}
  .sb-footer{padding:12px;border-top:1px solid #1e293b;display:flex;flex-direction:column;gap:6px;background:#111827;}
  .sb-btn{background:#1f2937;color:#cbd5e1;border:1px solid #374151;border-radius:8px;padding:10px 12px;cursor:pointer;font-weight:600;font-size:11px;font-family:'IBM Plex Sans',sans-serif;text-align:left;transition:.15s;}
  .sb-btn:hover{background:#374151;color:#fff;}
  .sb-btn.warn{color:#fbbf24;border-color:#78350f;}
  .sb-btn.info{color:#67e8f9;border-color:#164e63;}
  .sb-btn.success{color:#6ee7b7;border-color:#064e3b;}
  .nav-section{margin-bottom:12px;}
  .nav-header{display:flex;justify-content:space-between;align-items:center;padding:0 18px;margin-bottom:6px;}
  .nav-label{font-size:10px;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:.8px;}
  .year-del-btn{cursor:pointer;color:#f87171;font-size:9px;padding:2px 6px;border:1px solid #7f1d1d;border-radius:4px;transition:.15s;}
  .year-del-btn:hover{background:#f87171;color:#fff;}
  .nav-link{display:flex;align-items:center;justify-content:space-between;padding:8px 20px;color:#94a3b8;cursor:pointer;transition:.15s;font-weight:500;font-size:12px;}
  .nav-link:hover{background:#1f2937;color:#fff;}
  .nav-link.active{background:var(--teal);color:#fff;border-left:3px solid #5eead4;padding-left:17px;}
  .nav-badge{font-family:'IBM Plex Mono',monospace;font-size:10px;opacity:.75;}
  .nav-badge.pos{color:#6ee7b7;}.nav-badge.neg{color:#fca5a5;}
  .desktop-content{flex:1;padding:30px 40px;overflow-x:hidden;min-width:0;}
  .summary-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:28px;}
  .sum-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 18px;}
  .sum-card .lbl{font-size:9px;font-weight:700;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.6px;}
  .sum-card .val{font-family:'IBM Plex Mono',monospace;font-size:15px;font-weight:600;}
  .sum-card.inv-card{grid-column:span 2;}
  .maas-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px 22px;margin-bottom:24px;}
  .maas-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
  .maas-lbl{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;}
  .maas-input{font-size:26px;font-weight:800;font-family:'IBM Plex Mono',monospace;color:var(--teal);border:none;background:none;outline:none;width:100%;padding:4px 0;margin-top:4px;}
  .maas-input:focus{background:#f0fdfa;border-radius:6px;padding:4px 8px;}
  .note-btn{background:#f8fafc;border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:11px;font-weight:600;color:var(--muted);cursor:pointer;font-family:inherit;}
  .note-btn.has-note{background:#fef9c3;border-color:#fde047;color:#854d0e;}
  .tbl-row{display:grid;grid-template-columns:38px 36px 1fr 130px 90px 58px 88px 38px;align-items:center;padding:7px 20px;border-bottom:1px solid #f1f5f9;gap:10px;}
  .tbl-row.yatirim-row{grid-template-columns:38px 1fr 100px 120px 130px 58px 38px;}
  .tbl-row.header{background:#f8fafc;font-size:9px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid var(--border);}
  .tbl-row:last-of-type:not(.header){border-bottom:none;}
  .tbl-row.paid-row{background:#f0fdf4;}.tbl-row.overdue-row{background:#fee2e2;}
  input{border:none;background:transparent;font-size:13px;width:100%;outline:none;padding:5px 2px;color:inherit;font-family:inherit;}
  input:focus{background:#f8fafc;border-radius:4px;}
  input.tutar-input:focus{color:inherit;}
  .tutar-input{text-align:right;font-family:'IBM Plex Mono',monospace;font-weight:700;transition:.2s;}
  .tarih-input{padding:5px 4px;border-radius:6px;font-weight:600;text-align:center;font-family:'IBM Plex Mono',monospace;font-size:11px;cursor:pointer;}
  .bank-logo{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;flex-shrink:0;}
  .copy-btn{cursor:pointer;font-size:15px;opacity:.15;transition:.2s;text-align:center;user-select:none;}
  .copy-btn.active{opacity:1;}
  .paid-check{width:18px;height:18px;cursor:pointer;accent-color:var(--teal);}
  .taksit-badge{background:#eff6ff;color:#1e40af;padding:3px 7px;border-radius:5px;font-size:10px;font-weight:800;border:1px solid #bfdbfe;white-space:nowrap;display:flex;align-items:center;justify-content:center;gap:3px;}
  .taksit-badge.last{background:#fef9c3;color:#854d0e;border-color:#fde047;}
  .del-btn{cursor:pointer;color:#cbd5e1;text-align:center;font-size:16px;transition:.15s;user-select:none;}
  .del-btn:hover{color:#f87171;}
  .add-row-btn{background:#f8fafc;border:none;color:var(--muted);cursor:pointer;font-size:12px;padding:14px;width:100%;font-weight:600;font-family:'IBM Plex Sans',sans-serif;transition:.15s;text-align:left;}
  .add-row-btn:hover{background:#f1f5f9;color:var(--teal);}
  .dash-panel{background:#fff;padding:24px;border-radius:14px;border:1px solid var(--border);margin-bottom:24px;}
}

/* ══ MOBİL (<768px) ══ */
@media(max-width:767px){
  .desktop-only{display:none!important;}
  html,body{height:100%;overflow:hidden;}
  body{background:#f1f5f9;overscroll-behavior:none;}
  .toast{bottom:calc(var(--nav-h) + var(--safe-bot) + 12px);left:16px;right:16px;text-align:center;max-width:none;}
  .mob-app{display:flex;flex-direction:column;height:100vh;height:100dvh;}
  .mob-header{height:56px;background:#161d2f;color:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 16px;flex-shrink:0;padding-top:var(--safe-top);}
  .mob-title{font-size:15px;font-weight:700;color:#5eead4;}
  .mob-subtitle{font-size:11px;color:#64748b;margin-top:1px;}
  .mob-menu-btn{background:none;border:none;color:#94a3b8;font-size:22px;cursor:pointer;padding:4px 6px;line-height:1;}
  .mob-scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;overscroll-behavior-y:contain;padding:12px 12px calc(var(--nav-h) + var(--safe-bot) + 12px);}
  .m-sum-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
  .m-sum-card{background:#fff;border-radius:12px;padding:12px 14px;border:1px solid var(--border);}
  .m-sum-card.span2{grid-column:span 2;}
  .m-sum-card .lbl{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;}
  .m-sum-card .val{font-family:'IBM Plex Mono',monospace;font-size:16px;font-weight:700;}
  .m-sum-card .val.sm{font-size:11px;color:var(--clr-yatirim);}
  .m-maas-card{background:#fff;border-radius:12px;padding:13px 15px;margin-bottom:10px;border:1px solid var(--border);}
  .m-maas-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
  .m-maas-lbl{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
  .m-maas-actions{display:flex;gap:8px;align-items:center;}
  .m-maas-pct{font-size:11px;font-weight:700;}
  .note-btn{background:#f8fafc;border:1px solid var(--border);border-radius:7px;padding:4px 9px;font-size:11px;font-weight:600;color:var(--muted);cursor:pointer;font-family:inherit;}
  .note-btn.has-note{background:#fef9c3;border-color:#fde047;color:#854d0e;}
  .m-maas-input{font-size:26px;font-weight:800;font-family:'IBM Plex Mono',monospace;color:var(--teal);border:none;background:none;outline:none;width:100%;padding:2px 0;}
  .m-maas-input:focus{background:#f0fdfa;border-radius:8px;padding:4px 10px;}
  .m-perc-row{display:flex;align-items:center;gap:8px;margin-top:8px;}
  .m-perc-txt{font-size:10px;font-weight:600;color:var(--muted);white-space:nowrap;}
  .m-row{padding:10px 13px;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;gap:10px;min-height:52px;}
  .m-row:last-of-type{border-bottom:none;}
  .m-row.paid{background:#f0fdf4;}.m-row.overdue{background:#fee2e2;}
  .m-logo{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff;flex-shrink:0;}
  .m-body{flex:1;min-width:0;}
  .m-ad{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .m-ad.paid-txt{text-decoration:line-through;color:var(--muted);}
  .m-meta{display:flex;align-items:center;gap:5px;margin-top:2px;flex-wrap:wrap;}
  .m-tarih{font-size:10px;font-family:'IBM Plex Mono',monospace;font-weight:600;padding:1px 5px;border-radius:4px;}
  .m-taksit-badge{font-size:10px;font-weight:700;background:#eff6ff;color:#1e40af;padding:1px 5px;border-radius:4px;border:1px solid #bfdbfe;}
  .m-taksit-badge.last{background:#fef9c3;color:#854d0e;border-color:#fde047;}
  .m-copy-dot{font-size:13px;opacity:.2;}
  .m-copy-dot.on{opacity:1;}
  .m-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0;}
  .m-tutar{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:700;}
  .m-check{width:22px;height:22px;cursor:pointer;accent-color:var(--teal);flex-shrink:0;}
  .m-edit{display:none;padding:10px 13px 13px;background:#f8fafc;border-top:1px solid var(--border);}
  .m-edit.open{display:block;}
  .m-edit-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .m-edit-field label{display:block;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px;}
  .m-edit-field input{width:100%;height:40px;border:1px solid var(--border);border-radius:8px;padding:0 10px;font-size:14px;font-family:'IBM Plex Sans',sans-serif;background:#fff;color:var(--text);outline:none;}
  .m-edit-field input:focus{border-color:var(--teal);}
  .m-edit-field.full{grid-column:span 2;}
  .m-edit-actions{display:flex;gap:8px;margin-top:10px;}
  .m-edit-btn{flex:1;height:38px;border-radius:8px;border:1px solid var(--border);background:#fff;font-size:12px;font-weight:600;cursor:pointer;font-family:'IBM Plex Sans',sans-serif;color:var(--text);}
  .m-edit-btn.del{color:#dc2626;border-color:#fecaca;background:#fff5f5;}
  .m-edit-btn.copy-on{background:var(--teal);color:#fff;border-color:var(--teal);}
  .m-add-btn{display:flex;align-items:center;gap:6px;width:100%;padding:12px 13px;background:none;border:none;border-top:1px dashed var(--border);color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;font-family:'IBM Plex Sans',sans-serif;}
  .mob-nav{position:fixed;bottom:0;left:0;right:0;height:calc(var(--nav-h) + var(--safe-bot));background:#161d2f;border-top:1px solid #1e293b;display:flex;align-items:flex-start;padding-top:6px;padding-bottom:var(--safe-bot);z-index:200;}
  .mob-nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px;cursor:pointer;color:#475569;font-size:10px;font-weight:600;transition:color .15s;}
  .mob-nav-item.active{color:#5eead4;}
  .mob-nav-item .ni-icon{font-size:19px;line-height:1;}
  .mob-drawer{position:fixed;inset:0;z-index:300;display:none;}
  .mob-drawer.open{display:flex;flex-direction:column;}
  .drawer-bg{flex:1;background:rgba(15,23,42,.5);}
  .drawer-box{background:#fff;border-radius:20px 20px 0 0;max-height:85vh;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(16px + var(--safe-bot));animation:slideUp .22s ease;}
  @keyframes slideUp{from{transform:translateY(30px);opacity:0;}to{transform:translateY(0);opacity:1;}}
  .drawer-hdr{padding:14px 18px 10px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);position:sticky;top:0;background:#fff;z-index:1;}
  .drawer-title{font-size:15px;font-weight:700;}
  .drawer-close{font-size:22px;color:var(--muted);cursor:pointer;padding:2px 6px;}
  .year-section-mob{padding:8px 0;}
  .year-lbl-mob{padding:6px 18px 3px;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;display:flex;justify-content:space-between;align-items:center;}
  .year-del-mob{font-size:11px;color:#f87171;font-weight:700;cursor:pointer;}
  .month-grid-mob{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;padding:4px 14px 8px;}
  .month-btn-mob{padding:9px 4px;border-radius:9px;text-align:center;font-size:11px;font-weight:600;cursor:pointer;background:#f1f5f9;color:var(--muted);border:1px solid transparent;display:flex;flex-direction:column;align-items:center;gap:2px;}
  .month-btn-mob.active{background:var(--teal);color:#fff;}
  .month-btn-mob .mb-b{font-family:'IBM Plex Mono',monospace;font-size:9px;}
  .month-btn-mob.pos .mb-b{color:#10b981;}.month-btn-mob.neg .mb-b{color:#f87171;}
  .month-btn-mob.active .mb-b{color:rgba(255,255,255,.75);}
  .drawer-footer{padding:10px 14px;border-top:1px solid var(--border);display:flex;gap:8px;flex-wrap:wrap;}
  .drawer-btn{flex:1;min-width:120px;padding:10px;border-radius:9px;border:1px solid var(--border);background:#f8fafc;font-size:12px;font-weight:600;cursor:pointer;font-family:'IBM Plex Sans',sans-serif;color:var(--text);}
  .drawer-btn.success{color:#15803d;border-color:#86efac;background:#f0fdf4;}
  .drawer-btn.warn{color:#b45309;border-color:#fcd34d;background:#fffbeb;}
  .mob-menu-box{background:#fff;border-radius:20px 20px 0 0;padding:8px 0 calc(16px + var(--safe-bot));animation:slideUp .22s ease;}
  .menu-item-mob{display:flex;align-items:center;gap:12px;padding:14px 18px;font-size:13px;font-weight:600;cursor:pointer;color:var(--text);}
  .menu-item-mob:active{background:#f1f5f9;}
  .menu-item-mob .mi{font-size:17px;width:22px;text-align:center;}
  .menu-item-mob.info{color:#0369a1;}.menu-item-mob.warn{color:#b45309;}
  .menu-sep{height:1px;background:var(--border);margin:3px 0;}
  .mob-sync-info{padding:8px 18px 4px;font-size:11px;color:var(--muted);font-weight:500;}
  .m-chart-card{background:#fff;border-radius:12px;padding:14px;margin-bottom:10px;border:1px solid var(--border);}
  .m-chart-wrap{height:180px;position:relative;}
  .m-year-sel{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:9px;font-size:13px;font-weight:600;background:#fff;color:var(--text);outline:none;margin-bottom:10px;}
  .modal-overlay{align-items:flex-end;padding:0;}
  .modal-box{border-radius:20px 20px 0 0;max-height:80vh;overflow-y:auto;padding-bottom:calc(16px + var(--safe-bot));}
  .modal-footer{justify-content:stretch;}
  .modal-footer .modal-btn{flex:1;padding:12px;font-size:14px;}
}
</style>
</head>
<body>
<datalist id="altin-tipleri">
  <option value="ALTIN (Gr)"></option>
  <option value="ALTIN (Çeyrek)"></option>
</datalist>

<!-- ══ MASAÜSTÜ ══ -->
<div class="shell desktop-only">
  <div class="desktop-sidebar">
    <div class="sb-logo" onclick="showDashboard()">
      <span>💎 BÜTÇE PRO</span>
      <span id="sync-icon-d" style="color:#374151;font-size:10px">●</span>
    </div>
    <div class="sb-scroll" id="sb-nav"></div>
    <div class="sb-footer">
      <button class="sb-btn success" onclick="addYear()">📅 Yeni Yıl Ekle</button>

<script>
/* ══ PLATFORM ══ */
const isMobile=()=>window.innerWidth<768;

/* ══ CONFIG ══ */
const firebaseConfig={
  apiKey:"AIzaSyAsS...", // ← TAM KEY GİRİN
  authDomain:"butce-plan-emre.firebaseapp.com",
  projectId:"butce-plan-emre",
  storageBucket:"butce-plan-emre.firebasestorage.app",
  messagingSenderId:"438608180746",
  appId:"1:438608180746:web:95c95ebb8c7749024611f3"
};
firebase.initializeApp(firebaseConfig);
const db_cloud=firebase.firestore();
const budgetId="PRO-BUTCE-MASTER-V2";

/* ══ SABİTLER ══ */
const AY_ADLARI=['OCAK','ŞUBAT','MART','NİSAN','MAYIS','HAZİRAN','TEMMUZ','AĞUSTOS','EYLÜL','EKİM','KASIM','ARALIK'];
const BOLUMLER=[
  {id:'KREDİ KARTI',   icon:'💳',cls:'hdr-kredi',  defaults:[]},
  {id:'ALIŞVERİŞ',     icon:'🛒',cls:'hdr-market', defaults:['MARKET','NAKİT']},
  {id:'DİĞER ÖDEMELER',icon:'📑',cls:'hdr-diger',  defaults:['KİRA','KREŞ','FATURALAR']},
  {id:'YATIRIM',       icon:'💰',cls:'hdr-yatirim',defaults:[]}
];
const BANKA_RENK={'ALBARAKA':'#c41230','KUVEYT':'#006a4d','VAKIFBANK':'#b8860b','FİNANS':'#0033a0','İŞ':'#004a99','GARANTİ':'#10b981','YAPI':'#0033a0'};
const TATILLER=["01.01","20.03","21.03","22.03","23.04","01.05","19.05","27.05","28.05","29.05","30.05","15.07","30.08","29.10"];

/* ══ DURUM ══ */
let db_data={years:{}};
let currentView={screen:'month',dashYear:'ALL',y:new Date().getFullYear(),ay:AY_ADLARI[new Date().getMonth()]};
let saveTimer=null,openEditId=null;

/* ══ YARDIMCILAR ══ */
function isHoliday(d){const dd=String(d.getDate()).padStart(2,'0'),mm=String(d.getMonth()+1).padStart(2,'0');return TATILLER.includes(`${dd}.${mm}`);}
function adjNext(dO){let d=new Date(dO);while(d.getDay()===0||d.getDay()===6||isHoliday(d))d.setDate(d.getDate()+1);return d;}
function adjPrev(dO){let d=new Date(dO);while(d.getDay()===0||d.getDay()===6||isHoliday(d))d.setDate(d.getDate()-1);return d;}
function getLastBiz(y,mIdx){return adjPrev(new Date(y,mIdx+1,0));}
function fmtDate(d){return String(d.getDate()).padStart(2,'0')+'.'+String(d.getMonth()+1).padStart(2,'0')+'.'+d.getFullYear();}

function normalizeTarih(v,y,bId){
  if(!v)return v;
  if(v.includes('.')&&v.split('.').length===3){
    const pts=v.split('.');let yy=parseInt(pts[2]);if(yy<100)yy+=2000;
    const dO=new Date(yy,parseInt(pts[1])-1,parseInt(pts[0]));
    if(isNaN(dO.getTime()))return v;
    return fmtDate(bId==='KREDİ KARTI'?adjNext(dO):adjPrev(dO));
  }
  const c=v.replace(/\D/g,'');
  if(c.length===8){const dO=new Date(parseInt(c.substring(4,8)),parseInt(c.substring(2,4))-1,parseInt(c.substring(0,2)));if(!isNaN(dO.getTime()))return fmtDate(bId==='KREDİ KARTI'?adjNext(dO):adjPrev(dO));}
  if(c.length===4){const dO=new Date(y,parseInt(c.substring(2,4))-1,parseInt(c.substring(0,2)));if(!isNaN(dO.getTime()))return fmtDate(bId==='KREDİ KARTI'?adjNext(dO):adjPrev(dO));}
  return v;
}

/* FİX: TR formatında çok sayıda virgüllü ifadeyi doğru hesapla */
function evalSafe(v){
  if(!v&&v!==0)return 0;
  try{
    let s=v.toString().trim().replace(/\s/g,'');
    const parts=s.split(/([+\-*\/])/);
    const conv=parts.map(p=>{
      if(/^[+\-*\/]$/.test(p))return p;
      return p.replace(/\./g,'').replace(',','.');
    });
    let c=conv.join('').replace(/[^0-9+\-*\/().]/g,'');
    if(!c)return 0;
    const r=Function('"use strict";return ('+c+')')()||0;
    return isFinite(r)?parseFloat(Number(r).toFixed(2)):0;
  }catch(e){return 0;}
}

function fmt(n){const val=Number(n||0);if(Object.is(val,-0)||val===0)return'0';return Math.abs(val).toLocaleString('tr-TR',{minimumFractionDigits:0,maximumFractionDigits:0});}
function fmtTL(n){const val=Number(n||0);if(Object.is(val,-0)||val===0)return'₺0';const f=Math.abs(val).toLocaleString('tr-TR',{minimumFractionDigits:0,maximumFractionDigits:0});return val<0?`-₺${f}`:`₺${f}`;}
function getRaw(y,ay,bId,i){const row=db_data.years[y]?.months[ay]?.bolumler[bId]?.rows[i];return row?(row.tutar_raw||''):'';}
function getMaasRaw(y,ay){return db_data.years[y]?.months[ay]?.maas_raw||'';}

function getBankLogo(name,mobile=false){
  const upper=(name||'').trim().toUpperCase();let c='#4b5563';let init='?';
  if(upper){init=upper[0];for(const k in BANKA_RENK){if(upper.includes(k)){c=BANKA_RENK[k];break;}}}
  const sz=mobile?30:26;const cls=mobile?'m-logo':'bank-logo';
  return `<div class="${cls}" style="background:${c};width:${sz}px;height:${sz}px">${init}</div>`;
}

function getDateStyles(v,isPaid){
  if(!v||!v.includes('.'))return{bg:'transparent',text:'#cbd5e1'};
  if(isPaid)return{bg:'#f0fdf4',text:'#15803d',deco:'line-through'};
  const pts=v.split('.');const t=new Date(parseInt(pts[2]),parseInt(pts[1])-1,parseInt(pts[0]));
  const today=new Date();today.setHours(0,0,0,0);
  return(t<=today)?{bg:'#fee2e2',text:'#b91c1c'}:{bg:'#f0fdf4',text:'#15803d'};
}
function ensureId(row){if(!row.id)row.id='r_'+Date.now()+'_'+Math.random().toString(36).slice(2);return row;}

/* ══ VERİ MODELİ ══ */
function defaultMonth(){
  const m={maas:0,maas_raw:'',notes:{kiraci:'',genel:''},bolumler:{}};
  BOLUMLER.forEach(b=>{
    m.bolumler[b.id]={rows:b.defaults.map(ad=>ensureId({
      ad,tutar:0,tutar_raw:'',miktar:'',birim:'',tarih:'',
      copy:false,isPaid:false,taksit:0,startAbs:0,baseDay:null,
      /* KK'da defaults boş, diğer bölümlerde _ph:false (kullanıcı satırı gibi) */
      _ph:false
    }))};
    /* KK boş olarak gelir, hiç satır yok */
    if(b.id==='KREDİ KARTI'){
      m.bolumler[b.id]={rows:[ensureId({ad:'',tutar:0,tutar_raw:'',miktar:'',birim:'',tarih:'',copy:false,isPaid:false,taksit:0,startAbs:0,baseDay:null,_ph:true})]};
    }
  });
  return m;
}

function initYear(y,doSave=true){
  y=Number(y);
  if(!db_data.years[y]){
    db_data.years[y]={months:{}};
    AY_ADLARI.forEach(ay=>{db_data.years[y].months[ay]=defaultMonth();});
    if(doSave)save();
  }
}

/* ══ FIREBASE ══ */
function loadSync(){
  db_cloud.collection('budgets').doc(budgetId).onSnapshot(doc=>{
    if(doc.exists){
      try{db_data=JSON.parse(doc.data().data);setSyncStatus(true);refresh();}
      catch(e){toast('Veri parse hatası.');}
    }else{initYear(currentView.y);refresh();}
  },err=>{
    setSyncStatus(false);toast('Offline çalışılıyor.');
    const local=localStorage.getItem('butce_offline');
    if(local){try{db_data=JSON.parse(local);}catch(e){}}
    if(!Object.keys(db_data.years).length)initYear(currentView.y,false);
    refresh();
  });
}
function setSyncStatus(ok){
  ['sync-icon-d','sync-icon-m'].forEach(id=>{const el=document.getElementById(id);if(el)el.style.color=ok?'#10b981':'#f87171';});
  const t=document.getElementById('mob-sync-txt');if(t)t.textContent=ok?'✓ Senkronize':'Offline — yerel veri';
}
function save(){
  const json=JSON.stringify(db_data);localStorage.setItem('butce_offline',json);
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>{db_cloud.collection('budgets').doc(budgetId).set({data:json}).catch(()=>toast('Kayıt hatası.'));},600);
}
function refresh(){if(currentView.screen==='month')showMonth(currentView.y,currentView.ay);else showDashboard(currentView.dashYear);}

/* ══ DEVREDEN BAKİYE ══ */
function getDevredenBakiye(stopY,stopAy){
  let total=0;const stopYN=Number(stopY);const stopMIdx=AY_ADLARI.indexOf(stopAy);
  Object.keys(db_data.years).sort().forEach(yStr=>{
    const yN=Number(yStr);if(yN>stopYN)return;
    AY_ADLARI.forEach((ay,mIdx)=>{
      if(yN===stopYN&&mIdx>=stopMIdx)return;
      const m=db_data.years[yStr]?.months[ay];if(!m)return;
      let net=m.maas||0;
      Object.entries(m.bolumler).forEach(([bId,b])=>{
        b.rows.forEach(r=>{if(r.isPaid)net+=(bId==='YATIRIM')?-Math.abs(r.tutar||0):(r.tutar||0);});
      });
      total+=net;
    });
  });
  return total;
}

/* ══ NAV (masaüstü) ══ */
function buildDesktopNav(){
  let html=`<div class="nav-section" style="margin-bottom:8px"><div class="nav-link ${currentView.screen==='dashboard'?'active':''}" onclick="showDashboard()">📊 <span style="margin-left:6px">Finansal Gelişim</span></div></div>`;
  Object.keys(db_data.years).sort((a,b)=>b-a).forEach(yStr=>{
    const y=Number(yStr);
    html+=`<div class="nav-section"><div class="nav-header"><span class="nav-label">📅 ${y}</span><div class="year-del-btn" onclick="deleteYear(${y})">SİL</div></div>`;
    AY_ADLARI.forEach(ay=>{
      const m=db_data.years[yStr]?.months[ay];let badge='';
      if(m){
        let maas=m.maas||0;let g=0;
        Object.entries(m.bolumler).forEach(([bId,b])=>b.rows.forEach(r=>{if(r.isPaid)g+=(bId==='YATIRIM')?-Math.abs(r.tutar||0):r.tutar;}));
        const net=maas+g;
        if(net!==0)badge=`<span class="nav-badge ${net>0?'pos':'neg'}">${net>0?'+':''}${Math.round(net/1000)}K</span>`;
      }
      const isAct=currentView.screen==='month'&&currentView.y===y&&currentView.ay===ay;
      html+=`<div class="nav-link ${isAct?'active':''}" onclick="showMonth(${y},'${ay}')">${ay} ${badge}</div>`;
    });
    html+=`</div>`;
  });
  const el=document.getElementById('sb-nav');if(el)el.innerHTML=html;
}

/* ══ CHART ══ */
function getChartData(targetYear){
  const gel=[],gid=[],yat=[];let cumYat=0;
  const years=(targetYear==='ALL')?Object.keys(db_data.years).sort():[String(targetYear)];
  AY_ADLARI.forEach(ay=>{
    let ayGel=0,ayGid=0,ayYat=0;
    years.forEach(yStr=>{
      const m=db_data.years[yStr]?.months[ay];if(!m?.bolumler)return;
      ayGel+=(m.maas||0);
      Object.entries(m.bolumler).forEach(([bId,b])=>{
        b.rows.forEach(r=>{if(!r.isPaid)return;if(bId==='YATIRIM'){ayYat+=Math.abs(r.tutar||0);ayGid-=Math.abs(r.tutar||0);}else ayGid+=(r.tutar||0);});
      });
    });
    gel.push(ayGel);gid.push(ayGid);cumYat+=ayYat;yat.push(cumYat);
  });
  return{gel,gid,yat};
}
function getAssetInventory(targetYear){
  const inv={};const years=(targetYear==='ALL')?Object.keys(db_data.years):[String(targetYear)];
  years.forEach(yStr=>{Object.values(db_data.years[yStr]?.months||{}).forEach(m=>{m.bolumler?.['YATIRIM']?.rows.forEach(r=>{if(r.isPaid&&r.ad&&r.miktar){const k=r.ad.toUpperCase().trim();inv[k]=(inv[k]||0)+Number(r.miktar||0);}});});});
  return Object.entries(inv).filter(([,q])=>q>0).map(([n,q])=>`${q} ${n}`).join(' · ')||'Henüz varlık yok';
}

let dashChart=null;
function showDashboard(year='ALL'){
  currentView.screen='dashboard';currentView.dashYear=year;
  const d=getChartData(year);const inv=getAssetInventory(year);
  const mwd=d.gel.filter(v=>v>0).length||1;
  const totGel=d.gel.reduce((a,b)=>a+b,0),totGid=d.gid.reduce((a,b)=>a+b,0);
  const yOpts=Object.keys(db_data.years).sort().map(y=>`<option value="${y}" ${year==y?'selected':''}>${y} Yılı</option>`).join('');

  if(isMobile()){
    setMobNav('mni-dash');
    document.getElementById('mob-subtitle').textContent='Finansal Gelişim';
    document.getElementById('mob-scroll').innerHTML=`
      <div class="m-chart-card">
        <select class="m-year-sel" onchange="showDashboard(this.value)">
          <option value="ALL" ${year==='ALL'?'selected':''}>Tüm Yıllar</option>${yOpts}
        </select>
        <div class="m-chart-wrap"><canvas id="finChart"></canvas></div>
      </div>
      <div class="m-sum-row">
        <div class="m-sum-card span2" style="border-color:#bbf7d0"><div class="lbl">Varlık Envanteri</div><div class="val sm">${inv}</div></div>
      </div>
      <div class="m-sum-row">
        <div class="m-sum-card"><div class="lbl">Ort. Gelir</div><div class="val" style="color:#0369a1">${fmtTL(totGel/mwd)}</div></div>
        <div class="m-sum-card"><div class="lbl">Ort. Gider</div><div class="val" style="color:#dc2626">${fmtTL(totGid/mwd)}</div></div>
      </div>
      <div class="m-sum-row">
        <div class="m-sum-card span2"><div class="lbl">Net Durum</div><div class="val" style="color:${totGel+totGid>=0?'#15803d':'#dc2626'}">${fmtTL(totGel+totGid)}</div></div>
      </div>`;
  }else{
    buildDesktopNav();
    document.getElementById('desktop-content').innerHTML=`
      <div class="dash-panel">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;flex-wrap:wrap;gap:10px">
          <div style="font-weight:800;font-size:16px;color:#1e293b">📊 Finansal Gelişim Paneli</div>
          <select style="background:#f1f5f9;padding:7px 14px;border-radius:8px;font-weight:700;font-size:12px;border:1px solid var(--border);outline:none" onchange="showDashboard(this.value)">
            <option value="ALL" ${year==='ALL'?'selected':''}>Tüm Yıllar</option>${yOpts}
          </select>
        </div>
        <div style="height:300px;position:relative"><canvas id="finChart"></canvas></div>
      </div>
      <div class="summary-grid">
        <div class="sum-card inv-card" style="border-color:#bbf7d0"><div class="lbl">💰 Varlık Envanteri</div><div class="val" style="color:#15803d;font-size:12px;margin-top:4px">${inv}</div></div>
        <div class="sum-card"><div class="lbl">Ort. Gelir</div><div class="val" style="color:#0369a1">${fmtTL(totGel/mwd)}</div></div>
        <div class="sum-card"><div class="lbl">Ort. Gider</div><div class="val" style="color:#dc2626">${fmtTL(totGid/mwd)}</div></div>
        <div class="sum-card"><div class="lbl">Net Durum</div><div class="val" style="color:${totGel+totGid>=0?'#15803d':'#dc2626'}">${fmtTL(totGel+totGid)}</div></div>
      </div>`;
  }
  if(dashChart){try{dashChart.destroy();}catch(e){}dashChart=null;}
  setTimeout(()=>{
    const canvas=document.getElementById('finChart');if(!canvas)return;
    dashChart=new Chart(canvas,{type:'bar',data:{labels:AY_ADLARI.map(a=>a.slice(0,3)),datasets:[
      {type:'bar',label:'Gelir',data:d.gel,backgroundColor:'rgba(3,105,161,.55)',order:2},
      {type:'bar',label:'Gider',data:d.gid.map(v=>Math.abs(v)),backgroundColor:'rgba(190,18,60,.55)',order:2},
      {type:'line',label:'Birikim',data:d.yat,borderColor:'#fbbf24',borderWidth:2.5,tension:.35,fill:false,order:1,pointRadius:2}
    ]},options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{font:{family:'IBM Plex Sans',size:isMobile()?9:11},boxWidth:10,padding:8}}},
      scales:{y:{ticks:{callback:v=>fmtTL(v),font:{size:isMobile()?8:10}},grid:{color:'#f1f5f9'}}}}});
  },50);
}

/* ══ AY SAYFASI ══ */
function showMonth(y,ay){
  y=Number(y);currentView={screen:'month',dashYear:currentView.dashYear,y,ay};
  if(!db_data.years[y])initYear(y);openEditId=null;
  const m=db_data.years[y].months[ay];const maas=m.maas||0;
  const devreden=getDevredenBakiye(y,ay);
  let giderOdenen=0;
  BOLUMLER.forEach(b=>{m.bolumler[b.id]?.rows.forEach(r=>{let c=r.tutar||0;if(b.id==='YATIRIM')c=-Math.abs(c);if(r.isPaid)giderOdenen+=c;});});
  const perc=maas>0?Math.min((Math.abs(giderOdenen)/maas)*100,100):0;
  const barColor=perc>90?'#dc2626':perc>65?'#f59e0b':'#10b981';
  const hasNote=m.notes?.kiraci||m.notes?.genel;
  const netKalan=devreden+maas+giderOdenen;
  if(isMobile()){
    setMobNav('mni-ay');
    document.getElementById('mob-subtitle').textContent=`${ay} ${y}`;
    document.getElementById('mob-scroll').innerHTML=renderMonthMobile(y,ay,m,maas,giderOdenen,perc,barColor,hasNote,netKalan);
  }else{
    buildDesktopNav();
    document.getElementById('desktop-content').innerHTML=renderMonthDesktop(y,ay,m,maas,giderOdenen,perc,barColor,hasNote,netKalan);
  }
}

/* ══ MASAÜSTÜ RENDER ══ */
function renderMonthDesktop(y,ay,m,maas,giderOdenen,perc,barColor,hasNote,netKalan){
  let html=`
    <div class="summary-grid">
      <div class="sum-card inv-card" style="border-color:#bbf7d0"><div class="lbl">💰 Varlık Envanteri (${y})</div><div class="val" style="color:#15803d;font-size:12px;margin-top:4px">${getAssetInventory(y)}</div></div>

/* ══ ORTAK İŞLEMLER ══ */
function toggleSection(hdr){const body=hdr.nextElementSibling;const chev=hdr.querySelector('.chev');body.classList.toggle('open');chev.classList.toggle('open');}

function saveMaas(y,ay,raw){
  db_data.years[y].months[ay].maas_raw=raw;db_data.years[y].months[ay].maas=evalSafe(raw);
  save();if(!isMobile())buildDesktopNav();
  const m=db_data.years[y].months[ay];const maas=m.maas||0;let g=0;
  BOLUMLER.forEach(b=>{m.bolumler[b.id]?.rows.forEach(r=>{let c=r.tutar||0;if(b.id==='YATIRIM')c=-Math.abs(c);if(r.isPaid)g+=c;});});
  const perc=maas>0?Math.min((Math.abs(g)/maas)*100,100):0;const bc=perc>90?'#dc2626':perc>65?'#f59e0b':'#10b981';
  const pb=document.getElementById('prog-bar');if(pb){pb.style.width=perc+'%';pb.style.background=bc;}
}

function rUp(bId,i,k,v){
  const m=db_data.years[currentView.y].months[currentView.ay];
  const row=m.bolumler[bId].rows[i];ensureId(row);
  if(k==='ad'){
    row.ad=v;
    if(v&&v.trim()!=='')row._ph=false; // ad yazılınca artık placeholder değil
  }else if(k==='tarih'){
    row.tarih=normalizeTarih(v,currentView.y,bId);
    if(v){const c=v.replace(/\D/g,'');if(c.length>=2)row.baseDay=parseInt(c.substring(0,2));}
  }else if(k==='tutar'){
    row.tutar_raw=v;const n=evalSafe(v);
    row.tutar=(bId==='YATIRIM')?Math.abs(n):-Math.abs(n);
    if(bId==='YATIRIM'&&row.miktar&&row.birim){row.tutar=evalSafe(row.miktar)*evalSafe(row.birim);row.tutar_raw=String(row.tutar);}
  }else if(k==='miktar'||k==='birim'){
    row[k]=v;
    if(row.miktar&&row.birim){const calc=evalSafe(row.miktar)*evalSafe(row.birim);row.tutar=calc;row.tutar_raw=String(calc);}
  }else if(k==='taksit'){
    row.taksit=parseInt(v)||0;
    if(!row.startAbs)row.startAbs=currentView.y*12+AY_ADLARI.indexOf(currentView.ay);
    if(row.taksit>0)row.copy=true;
    propagate(currentView.y,currentView.ay,bId,row);
  }else if(k==='isPaid'){row.isPaid=v;}
  else{row[k]=v;}
  if(k==='copy')propagate(currentView.y,currentView.ay,bId,row);
  save();showMonth(currentView.y,currentView.ay);
}

/* ══ PROPAGATE ══ */
function propagate(startY,startAy,bId,row){
  ensureId(row);
  const steps=parseInt(row.taksit)||0;
  const startAbs=Number(startY)*12+AY_ADLARI.indexOf(startAy);
  if(!row.startAbs)row.startAbs=startAbs;

  /* Limit:
     - Taksit: tam olarak steps-1 ay (yıl aşabilir)
     - KK+copy veya diğer+copy: o yılın Aralık'ına kadar
     - copy=false: 36 aylık silme taraması */
  let limit;
  if(steps>0){
    limit=steps-1;
  }else if(row.copy){
    limit=11-AY_ADLARI.indexOf(startAy); // yıl sonuna kadar
  }else{
    limit=36;
  }

  for(let i=1;i<=limit;i++){
    const curAbs=startAbs+i;
    const targetY=Math.floor(curAbs/12);
    const mIdx=curAbs%12;
    const mName=AY_ADLARI[mIdx];
    const shouldExist=row.copy||(steps>0&&i<steps);

    if(!db_data.years[targetY]){if(shouldExist)initYear(targetY,false);else continue;}
    const targetRows=db_data.years[targetY].months[mName].bolumler[bId]?.rows;
    if(!targetRows)continue;

    /* ID eşleşmesi: önce id'ye bak, sonra aynı ad + taksit olan satırı bul
       (defaultMonth'tan gelen aynı isimli satırı kaplamaması için) */
    let idx=targetRows.findIndex(r=>r.id===row.id);
    if(idx===-1&&steps>0){
      /* defaultMonth'tan gelen, aynı ada sahip, henüz taksit girilmemiş satır varsa onu al */
      const defIdx=targetRows.findIndex(r=>r.ad===row.ad&&(r.taksit===0||r.taksit===undefined)&&!r.isPaid&&r.id!==row.id);
      if(defIdx>-1){
        targetRows[defIdx].id=row.id; // ID'yi eşitle
        idx=defIdx;
      }
    }

    if(shouldExist){
      const newR={...row,isPaid:false};
      if(bId==='KREDİ KARTI'){
        // KK: tutar sıfırla, tarihi ilerlet (adjNext)
        newR.tutar=0;newR.tutar_raw='';
        const d=row.baseDay||(row.tarih?.includes('.')?parseInt(row.tarih.split('.')[0]):null)||1;
        newR.baseDay=d;
        newR.tarih=fmtDate(adjNext(new Date(targetY,mIdx,Math.min(d,new Date(targetY,mIdx+1,0).getDate()))));
      }else{
        // Taksit veya sürekli: girilen günü koru, tatil/hafta sonuna denk gelirse önceki iş gününe çek
        const bd=row.baseDay||(row.tarih?.includes('.')?parseInt(row.tarih.split('.')[0]):null)||null;
        if(bd){
          const lastOfMonth=new Date(targetY,mIdx+1,0).getDate();
          const targetDate=new Date(targetY,mIdx,Math.min(bd,lastOfMonth));
          // Tatil/hafta sonu ise önceki iş günü
          newR.tarih=fmtDate(adjPrev(targetDate));
          newR.baseDay=bd; // baseDay'i koru, bir sonraki ay için
        }else if(steps>0){
          // baseDay yoksa (eski veri): ay sonu iş günü
          newR.tarih=fmtDate(getLastBiz(targetY,mIdx));
        }
        // copy için baseDay yoksa tarihi olduğu gibi bırak
      }
      if(idx>-1)targetRows[idx]=newR;else targetRows.push(newR);

      /* KK: gerçek banka eklendikten sonra _ph:true placeholder satırları temizle */
      if(bId==='KREDİ KARTI'){
        const hasReal=targetRows.some(r=>r.ad&&r.ad.trim()!=='');
        if(hasReal){for(let j=targetRows.length-1;j>=0;j--){if(targetRows[j]._ph===true)targetRows.splice(j,1);}}
      }
    }else if(idx>-1){
      targetRows.splice(idx,1);
      /* KK: gerçek satır kalmadıysa placeholder geri ekle */
      if(bId==='KREDİ KARTI'){
        const hasAny=targetRows.some(r=>r.ad&&r.ad.trim()!=='');
        if(!hasAny)targetRows.push(ensureId({ad:'',tutar:0,tutar_raw:'',miktar:'',birim:'',tarih:'',copy:false,isPaid:false,taksit:0,startAbs:0,baseDay:null,_ph:true}));
      }
    }
  }
}

/* ══ toggleCopy ══ */
function toggleCopy(bId,i){
  const row=db_data.years[currentView.y].months[currentView.ay].bolumler[bId].rows[i];
  row.copy=!row.copy;
  if(!row.copy){
    /* copy kapatılınca: sonraki aylardaki kopyaları sil */
    const startAbs=Number(currentView.y)*12+AY_ADLARI.indexOf(currentView.ay);
    for(let j=1;j<=36;j++){
      const curAbs=startAbs+j;const tY=Math.floor(curAbs/12);const mIdx=curAbs%12;const mName=AY_ADLARI[mIdx];
      if(!db_data.years[tY])continue;
      const tRows=db_data.years[tY].months[mName].bolumler[bId]?.rows;if(!tRows)continue;
      const idx=tRows.findIndex(r=>r.id===row.id);if(idx>-1)tRows.splice(idx,1);
      if(bId==='KREDİ KARTI'){
        const hasAny=tRows.some(r=>r.ad&&r.ad.trim()!=='');
        if(!hasAny)tRows.push(ensureId({ad:'',tutar:0,tutar_raw:'',miktar:'',birim:'',tarih:'',copy:false,isPaid:false,taksit:0,startAbs:0,baseDay:null,_ph:true}));
      }
    }
  }else{
    /* copy açılınca: bu satırı gerçek yap, mevcut aydaki diğer _ph'ları temizle, yay */
    row._ph=false;
    if(bId==='KREDİ KARTI'){
      const curRows=db_data.years[currentView.y].months[currentView.ay].bolumler[bId].rows;
      for(let j=curRows.length-1;j>=0;j--){
        if(curRows[j]._ph===true&&curRows[j].id!==row.id)curRows.splice(j,1);
      }
    }
    propagate(currentView.y,currentView.ay,bId,row);
  }
  save();showMonth(currentView.y,currentView.ay);
}

function rAdd(bId){
  db_data.years[currentView.y].months[currentView.ay].bolumler[bId].rows.push(
    ensureId({ad:'',tutar:0,tutar_raw:'',miktar:'',birim:'',tarih:'',copy:false,isPaid:false,taksit:0,startAbs:0,baseDay:null,_ph:false})
  );
  save();showMonth(currentView.y,currentView.ay);
}
function rDel(bId,i){db_data.years[currentView.y].months[currentView.ay].bolumler[bId].rows.splice(i,1);save();showMonth(currentView.y,currentView.ay);}

function focusNextInput(current){
  const inputs=Array.from(document.querySelectorAll('input:not([type="checkbox"]):not([type="number"])'));
  const idx=inputs.indexOf(current);const ni=idx+1;
  if(idx>-1&&ni<inputs.length){setTimeout(()=>{const r=Array.from(document.querySelectorAll('input:not([type="checkbox"]):not([type="number"])'));if(r[ni]){r[ni].focus();r[ni].select();}},50);}
}

function addYear(){const y=prompt('Eklenecek yıl?',new Date().getFullYear()+1);if(!y||isNaN(y))return;const yn=parseInt(y);if(db_data.years[yn]){toast(`${yn} zaten mevcut.`);return;}initYear(yn);showMonth(yn,'OCAK');toast(`${yn} yılı oluşturuldu.`);}
function deleteYear(y){if(!confirm(`${y} yılı silinecek. Emin misiniz?`))return;delete db_data.years[y];save();toast(`${y} silindi.`);showDashboard();}
function resetCurrentMonth(){if(!confirm(`${currentView.ay} ${currentView.y} sıfırlansın mı?`))return;db_data.years[currentView.y].months[currentView.ay]=defaultMonth();save();showMonth(currentView.y,currentView.ay);toast('Ay temizlendi.');}

let _noteCtx=null;
function openNoteModal(y,ay){_noteCtx={y,ay};const notes=db_data.years[y]?.months[ay]?.notes||{};document.getElementById('note-kiraci').value=notes.kiraci||'';document.getElementById('note-genel').value=notes.genel||'';document.getElementById('note-modal').style.display='flex';}
function closeNoteModal(){document.getElementById('note-modal').style.display='none';_noteCtx=null;}
function saveNoteModal(){if(!_noteCtx)return;const{y,ay}=_noteCtx;if(!db_data.years[y].months[ay].notes)db_data.years[y].months[ay].notes={};db_data.years[y].months[ay].notes.kiraci=document.getElementById('note-kiraci').value;db_data.years[y].months[ay].notes.genel=document.getElementById('note-genel').value;save();closeNoteModal();showMonth(y,ay);toast('Notlar kaydedildi.');}

function exportData(){const json=JSON.stringify(db_data,null,2);const blob=new Blob([json],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`butce_yedek_${new Date().toISOString().split('T')[0]}.json`;a.click();toast('Yedek indirildi.');}
function importData(event){const file=event.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=e=>{try{const imp=JSON.parse(e.target.result);if(!imp.years)throw new Error();if(!confirm('Mevcut veriler silinecek. Emin misiniz?'))return;db_data=imp;save();refresh();toast('Yedek yüklendi.');}catch(err){toast('Geçersiz yedek dosyası.');}};reader.readAsText(file);event.target.value='';}

/* ══ MOBİL YARDIMCILAR ══ */
function setMobNav(id){['mni-ay','mni-aylar','mni-dash'].forEach(n=>{document.getElementById(n)?.classList.remove('active');});document.getElementById(id)?.classList.add('active');}
function showCurrentMonth(){showMonth(currentView.y,currentView.ay);}
function toggleMobEdit(rowId){
  if(openEditId===rowId){openEditId=null;document.getElementById('ep-'+rowId)?.classList.remove('open');}
  else{if(openEditId)document.getElementById('ep-'+openEditId)?.classList.remove('open');openEditId=rowId;const el=document.getElementById('ep-'+rowId);if(el){el.classList.add('open');el.scrollIntoView({behavior:'smooth',block:'nearest'});}}
}
function openMonthDrawer(){buildMonthDrawer();document.getElementById('month-drawer').classList.add('open');}
function closeMonthDrawer(){document.getElementById('month-drawer').classList.remove('open');}
function buildMonthDrawer(){
  let html='';
  Object.keys(db_data.years).sort((a,b)=>b-a).forEach(yStr=>{
    const y=Number(yStr);html+=`<div class="year-section-mob"><div class="year-lbl-mob">${y} <span class="year-del-mob" onclick="deleteYear(${y})">Sil</span></div><div class="month-grid-mob">`;
    AY_ADLARI.forEach(ay=>{
      const m=db_data.years[yStr]?.months[ay];let badge='';let cls='';
      if(m){let maas=m.maas||0;let g=0;Object.entries(m.bolumler).forEach(([bId,b])=>b.rows.forEach(r=>{if(r.isPaid)g+=(bId==='YATIRIM')?-Math.abs(r.tutar||0):r.tutar;}));const net=maas+g;if(net!==0){badge=`<span class="mb-b">${net>0?'+':''}${Math.round(net/1000)}K</span>`;cls=net>0?'pos':'neg';}}
      const isAct=currentView.screen==='month'&&currentView.y===y&&currentView.ay===ay;
      html+=`<div class="month-btn-mob ${isAct?'active':''} ${cls}" onclick="closeMonthDrawer();showMonth(${y},'${ay}')">${ay.slice(0,3)}${badge}</div>`;
    });
    html+=`</div></div>`;
  });
  document.getElementById('drawer-months').innerHTML=html;
}
function openMobMenu(){document.getElementById('mob-menu-drawer').classList.add('open');}
function closeMobMenu(){document.getElementById('mob-menu-drawer').classList.remove('open');}

let _toastTimer;
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(_toastTimer);_toastTimer=setTimeout(()=>t.classList.remove('show'),3000);}

let _resizeTimer;
window.addEventListener('resize',()=>{clearTimeout(_resizeTimer);_resizeTimer=setTimeout(()=>refresh(),300);});

loadSync();
</script>
